{% extends "base.html" %}

{% block title %}
Data Pengguna
{% endblock %}

{% block content %}
{% include "login_daftar_nav.html" %}

<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
        <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-blue-900">Data Pengguna</h2>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            {% if messages %}
                <div class="space-y-1">
                    {% for message in messages %}
                        <div class="px-4 py-3 text-md font-medium rounded-xl border 
                        {% if message.tags == 'success' %}
                            bg-green-100 text-green-800 border-green-300
                        {% elif message.tags == 'error' %}
                            bg-red-100 text-red-800 border-red-300
                        {% elif message.tags == 'warning' %}
                            bg-yellow-100 text-yellow-800 border-yellow-300
                        {% elif message.tags == 'info' %}
                            bg-blue-100 text-blue-800 border-blue-300
                        {% else %}
                            bg-gray-100 text-gray-800 border-gray-300
                        {% endif %}
                        " role="alert">
                            <p>{{ message }}</p>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
            <div>
                <label for="name" class="block text-sm/6 font-medium text-blue-900">Nama Anda</label>
                <div class="mt-2">
                    <input id="name" type="text" name="name" required autofocus class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 outline-gray-100 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6" />
                </div>
            </div>

            <div>
                <label for="institute_name" class="block text-sm/6 font-medium text-blue-900">Nama Institusi</label>
                <div class="mt-2">
                    <input id="institute_name" type="text" name="institute_name" required class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 outline-gray-100 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 sm:text-sm/6" />
                </div>
            </div>

            <div class="flex justify-end items-center">
                <button type="submit" class="flex justify-center rounded-md bg-blue-600 px-5 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-blue-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 cursor-pointer">Masuk</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
